<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DQW Selection Assistant - Embed Mode</title>
    <meta name="robots" content="noindex, nofollow">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');

        :root {
            --bg-neutral: #F8FAFC;
            --tech-blue: #0F172A;
            --accent-blue: #2563EB;
            --safety-green: #22C55E;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: transparent;
            /* Transparent for embed */
            color: var(--tech-blue);
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }

        .stagger-item {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease-out;
        }

        .stagger-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Custom Slider Styling */
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #2563EB;
            border: 4px solid white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .selected-card {
            border-color: #2563EB;
            background-color: #EFF6FF;
            box-shadow: 0 0 25px rgba(37, 99, 235, 0.15);
            transform: scale(1.02);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <div id="app" class="relative flex-1 flex flex-col p-4 md:p-8">

        <!-- Main Container -->
        <div class="max-w-[1440px] mx-auto w-full flex-1">

            <!-- 1. HUB / LANDING (Visible by default) -->
            <section id="hub-section" class="py-8 text-center space-y-10">
                <div class="max-w-3xl mx-auto space-y-4 px-4">
                    <h1 class="text-3xl md:text-5xl font-black text-slate-900 tracking-tighter leading-tight">
                        Selection <span class="text-blue-600 italic">Assistant.</span>
                    </h1>
                    <p class="text-slate-500 text-sm md:text-lg font-medium leading-relaxed max-w-2xl mx-auto">
                        Choose a vacuum system category below to start the configuration.
                    </p>
                </div>

                <div class="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto px-2">
                    <!-- Option Lifters -->
                    <div onclick="app.startModule('lifters')"
                        class="group bg-white border border-slate-200 p-8 rounded-[2.5rem] shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all cursor-pointer text-left relative overflow-hidden focus:outline-none focus:ring-4 focus:ring-blue-300">
                        <!-- SVG Background Dekoratif Rata Kanan dengan efek hover -->
                        <img src="/vacuum.svg" alt="Vacuum BG"
                            class="absolute right-0 bottom-0 top-0 h-full w-auto object-contain opacity-10 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none select-none"
                            style="z-index:1;" />
                        <div class="relative z-10 space-y-6">
                            <div
                                class="w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                                <canvas id="icon-lifter-hub" width="36" height="36"></canvas>
                            </div>
                            <div>
                                <h3 class="text-xl md:text-2xl font-black text-slate-900 leading-tight">
                                    Vacuum<br>Lifters</h3>
                                <p class="text-slate-500 mt-2 font-medium text-xs md:text-sm">Ergonomic manual handling
                                    (Jumbo/VacuMaster).</p>
                            </div>
                            <div
                                class="flex items-center gap-2 text-blue-600 font-bold text-[10px] md:text-xs uppercase tracking-widest group-hover:translate-x-2 transition-transform">
                                Start Lifter Audit &#8594;
                            </div>
                        </div>
                    </div>

                    <!-- Option Generators -->
                    <div onclick="app.startModule('generators')"
                        class="group bg-white border border-slate-200 p-8 rounded-[2.5rem] shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all cursor-pointer text-left relative overflow-hidden focus:outline-none focus:ring-4 focus:ring-blue-300">
                        <!-- SVG Background Dekoratif Rata Kanan dengan efek hover -->
                        <img src="/generator.svg" alt="Generator BG"
                            class="absolute right-0 bottom-0 top-0 h-full w-auto object-contain opacity-10 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none select-none"
                            style="z-index:1;" />
                        <div class="relative z-10 space-y-6">
                            <div
                                class="w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                                <canvas id="icon-gen-hub" width="36" height="36"></canvas>
                            </div>
                            <div>
                                <h3 class="text-xl md:text-2xl font-black text-slate-900 leading-tight">
                                    Vacuum<br>Generators</h3>
                                <p class="text-slate-500 mt-2 font-medium text-xs md:text-sm">Automation system & ejector
                                    (Ejector/Pump).</p>
                            </div>
                            <div
                                class="flex items-center gap-2 text-blue-600 font-bold text-[10px] md:text-xs uppercase tracking-widest group-hover:translate-x-2 transition-transform">
                                Start Generator Audit &#8594;
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 2. WORKSPACE SECTION (Hidden by default) -->
            <section id="workspace-section" class="hidden">
                <div class="grid lg:grid-cols-12 gap-6 items-start">

                    <!-- Sidebar Audit Log -->
                    <aside class="hidden lg:block lg:col-span-3 space-y-6 sticky top-8">
                        <div
                            class="bg-white border border-slate-200 p-6 rounded-[2rem] shadow-lg shadow-blue-900/5 relative overflow-hidden">
                            <div class="flex items-center gap-2 mb-6 border-b border-slate-100 pb-4">
                                <div
                                    class="w-4 h-4 bg-blue-600 rounded flex items-center justify-center text-white text-[8px] font-bold italic">
                                    i</div>
                                <h3 class="font-black text-[10px] uppercase tracking-[0.2em] text-slate-900">Live Logs
                                </h3>
                            </div>
                            <div id="audit-log-content" class="space-y-3 max-h-[60vh] overflow-y-auto hide-scrollbar">
                                <!-- Dynamic audit entries -->
                            </div>

                            <!-- Reset Button in Sidebar -->
                            <button onclick="app.resetToHub()"
                                class="mt-6 w-full py-3 rounded-xl border border-slate-200 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:bg-slate-50 hover:text-slate-900 transition-colors focus:outline-none focus:ring-2 focus:ring-slate-300">
                                Reset Audit
                            </button>
                        </div>
                    </aside>

                    <!-- Main Logic Card -->
                    <div class="col-span-1 lg:col-span-9 space-y-6">
                        <!-- Progress Visual -->
                        <div id="stepper-visual"
                            class="bg-white p-4 rounded-[2rem] shadow-sm border border-slate-200 overflow-x-auto hide-scrollbar">
                            <div id="stepper-track"
                                class="flex justify-between px-4 relative min-w-[500px] md:min-w-full">
                                <!-- Steps added by JS -->
                            </div>
                        </div>

                        <!-- Interaction Area -->
                        <div
                            class="bg-white border border-slate-200 rounded-[2rem] shadow-2xl shadow-blue-900/5 min-h-[500px] flex flex-col overflow-hidden relative">
                            <div id="step-container" class="p-6 md:p-12 flex-1 flex flex-col">
                                <!-- Dynamic Step Content -->
                            </div>

                            <!-- Footer Nav -->
                            <div
                                class="px-6 py-6 bg-slate-50/80 backdrop-blur-sm border-t border-slate-100 flex flex-col-reverse md:flex-row justify-between items-center gap-4 relative z-20">
                                <button onclick="app.prevStep()" id="btn-back"
                                    class="w-full md:w-auto flex items-center justify-center gap-3 font-black text-[10px] uppercase tracking-[0.3em] transition-all px-8 py-4 rounded-full text-slate-400 hover:text-blue-900 hover:bg-slate-200/50 focus:outline-none focus:ring-2 focus:ring-slate-300">
                                    &#8592; BACK
                                </button>
                                <button onclick="app.nextStep()" id="btn-next"
                                    class="w-full md:w-auto bg-slate-900 text-white px-8 md:px-12 py-4 rounded-full md:rounded-[2rem] font-black text-[10px] uppercase tracking-[0.3em] hover:bg-blue-600 transition-all shadow-xl flex items-center justify-center gap-4 group disabled:opacity-30 disabled:cursor-not-allowed focus:outline-none focus:ring-4 focus:ring-blue-300">
                                    <span id="btn-next-text">CONTINUE</span>
                                    <span class="group-hover:translate-x-1 transition-transform">&#8594;</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </div>

    <script>
        // --- DATA ARCHITECTURE ---
        const DATA = {
            lifters: {
                title: "Vacuum Lifters",
                steps: [
                    {
                        id: 'workpiece', label: 'Material', title: 'Material Type', desc: 'What are you lifting?', type: 'grid', options: [
                            { id: 'cardboard', label: 'Cardboard', sub: 'Carton / Box' },
                            { id: 'bag', label: 'Sack', sub: 'Plastic/Paper Sack' },
                            { id: 'wood', label: 'Wood', sub: 'Wood Panel' },
                            { id: 'metal', label: 'Metal', sub: 'Steel Plate' },
                            { id: 'barrel', label: 'Barrel', sub: 'Drum / Can' },
                            { id: 'glass', label: 'Glass', sub: 'Glass / Window' },
                            { id: 'bucket', label: 'Bucket', sub: 'Paint Bucket' },
                            { id: 'luggage', label: 'Luggage', sub: 'Baggage' }
                        ]
                    },
                    { id: 'weight', label: 'Load', title: 'Maximum Weight', desc: 'Weight of the heaviest workpiece (Safe Working Load).', type: 'slider', min: 0, max: 250 },
                    {
                        id: 'movement', label: 'Movement', title: 'Movement Type', desc: 'How is the item moved?', type: 'binary', options: [
                            { id: 'horizontal', label: 'Horizontal', sub: 'Lift & Transfer Only' },
                            { id: 'tilt', label: 'Tilt / Turn', sub: 'Rotate or Flip Item' }
                        ]
                    },
                    {
                        id: 'cycle', label: 'Cycles', title: 'Lifting Frequency', desc: 'How many lifts per minute?', type: 'binary', options: [
                            { id: 'high', label: 'High Freq', sub: '> 10x per minute (Fast)' },
                            { id: 'low', label: 'Low Freq', sub: '< 5x per minute (Slow)' }
                        ]
                    },
                    { id: 'results', label: 'Solution', title: 'Recommendation', desc: 'DQW handling recommendation.', type: 'results' }
                ]
            },
            generators: {
                title: "Vacuum Generators",
                steps: [
                    {
                        id: 'power', label: 'Power', title: 'Power Source', desc: 'What power source is available?', type: 'binary', options: [
                            { id: 'pneumatic', label: 'Pneumatic', sub: 'Air Compressor' },
                            { id: 'electric', label: 'Electric', sub: 'Electricity (24V/220V)' }
                        ]
                    },
                    {
                        id: 'porosity', label: 'Surface', title: 'Workpiece Porosity', desc: 'Does air pass through the workpiece?', type: 'binary', options: [
                            { id: 'air-tight', label: 'Air-tight', sub: 'Sealed (Metal, Glass)' },
                            { id: 'porous', label: 'Porous', sub: 'Porous (Carton, Wood)' }
                        ]
                    },
                    {
                        id: 'environment', label: 'Area', title: 'Environment', desc: 'What is the work environment?', type: 'binary', options: [
                            { id: 'clean', label: 'Clean', sub: 'Standard / Clean' },
                            { id: 'dusty', label: 'Dirty/Dusty', sub: 'Dusty / Humid' }
                        ]
                    },
                    {
                        id: 'system', label: 'Robot', title: 'Integration', desc: 'What robot type is used?', type: 'grid', options: [
                            { id: 'cobot', label: 'Cobot', sub: 'Collaborative' },
                            { id: 'industrial', label: 'Industrial', sub: 'Heavy Robot' },
                            { id: 'gantry', label: 'Gantry', sub: 'Linear Axis' },
                            { id: 'manual', label: 'Manual', sub: 'Fixture' }
                        ]
                    },
                    { id: 'results', label: 'Solution', title: 'Recommendation', desc: 'DQW vacuum recommendation.', type: 'results' }
                ]
            }
        };

        // --- CANVAS DRAWING LIBRARY ---
        const DrawLib = {
            setup: (id) => {
                const canvas = document.getElementById(id);
                if (!canvas) return null;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                return ctx;
            },

            lifterHub: (id) => {
                const ctx = DrawLib.setup(id);
                if (!ctx) return;
                ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(18, 5); ctx.lineTo(18, 25);
                ctx.moveTo(8, 25); ctx.lineTo(28, 25);
                ctx.moveTo(10, 25); ctx.lineTo(13, 33);
                ctx.moveTo(26, 25); ctx.lineTo(23, 33);
                ctx.moveTo(13, 33); ctx.lineTo(23, 33);
                ctx.stroke();
            },

            genHub: (id) => {
                const ctx = DrawLib.setup(id);
                if (!ctx) return;
                ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
                ctx.strokeRect(8, 12, 20, 12);
                ctx.beginPath();
                ctx.moveTo(5, 18); ctx.lineTo(8, 18);
                ctx.moveTo(28, 18); ctx.lineTo(31, 18);
                ctx.moveTo(18, 24); ctx.lineTo(18, 30);
                ctx.stroke();
            },

            // --- ICONS ---
            cardboard: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.strokeRect(15, 20, 30, 25);
                ctx.beginPath(); ctx.moveTo(15, 20); ctx.lineTo(25, 10); ctx.lineTo(45, 20); ctx.stroke();
            },
            bag: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(20, 10); ctx.bezierCurveTo(10, 20, 10, 45, 20, 50); ctx.lineTo(40, 50); ctx.bezierCurveTo(50, 45, 50, 20, 40, 10); ctx.quadraticCurveTo(30, 15, 20, 10); ctx.stroke();
            },
            wood: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.strokeRect(10, 15, 40, 30); ctx.beginPath(); ctx.moveTo(35, 25); ctx.arc(35, 28, 2, 0, Math.PI * 2); ctx.stroke();
            },
            metal: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.strokeRect(10, 20, 40, 20); ctx.beginPath(); ctx.moveTo(15, 40); ctx.lineTo(25, 20); ctx.stroke();
            },
            barrel: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.ellipse(30, 15, 15, 5, 0, 0, Math.PI * 2); ctx.moveTo(15, 15); ctx.lineTo(15, 45); ctx.moveTo(45, 15); ctx.lineTo(45, 45); ctx.ellipse(30, 45, 15, 5, 0, 0, Math.PI, 0); ctx.stroke();
            },
            glass: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.rect(15, 15, 30, 30); ctx.moveTo(25, 35); ctx.lineTo(35, 25); ctx.stroke();
            },
            bucket: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.ellipse(30, 20, 12, 4, 0, 0, Math.PI * 2); ctx.moveTo(18, 20); ctx.lineTo(20, 45); ctx.moveTo(42, 20); ctx.lineTo(40, 45); ctx.ellipse(30, 45, 10, 3, 0, 0, Math.PI, 0); ctx.stroke();
            },
            luggage: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.strokeRect(15, 20, 30, 25); ctx.beginPath(); ctx.moveTo(25, 20); ctx.lineTo(25, 15); ctx.lineTo(35, 15); ctx.lineTo(35, 20); ctx.stroke();
            },
            pneumatic: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(30, 30, 12, 0, Math.PI * 2); ctx.moveTo(30, 30); ctx.lineTo(36, 24); ctx.stroke();
            },
            electric: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(30, 10); ctx.lineTo(20, 30); ctx.lineTo(32, 30); ctx.lineTo(22, 50); ctx.stroke();
            },
            airtight: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.strokeRect(15, 15, 30, 30); ctx.beginPath(); ctx.moveTo(15, 15); ctx.lineTo(45, 45); ctx.stroke();
            },
            porous: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.strokeRect(15, 15, 30, 30); ctx.fillStyle = '#475569'; ctx.fillRect(25, 25, 2, 2); ctx.fillRect(35, 35, 2, 2); ctx.stroke();
            },
            clean: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(30, 30, 10, 0, Math.PI * 2); ctx.moveTo(30, 15); ctx.lineTo(30, 10); ctx.stroke();
            },
            dusty: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(15, 40); ctx.quadraticCurveTo(25, 30, 35, 40); ctx.quadraticCurveTo(45, 30, 55, 40); ctx.stroke();
            },
            cobot: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(30, 20, 6, 0, Math.PI * 2); ctx.moveTo(30, 26); ctx.lineTo(30, 35); ctx.moveTo(20, 35); ctx.lineTo(40, 35); ctx.stroke();
            },
            industrial: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.strokeRect(20, 40, 20, 10); ctx.beginPath(); ctx.moveTo(30, 40); ctx.lineTo(30, 20); ctx.lineTo(45, 10); ctx.stroke();
            },
            high: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(10, 30); ctx.lineTo(20, 15); ctx.lineTo(30, 40); ctx.lineTo(40, 10); ctx.lineTo(50, 30); ctx.stroke();
            },
            low: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(10, 30); ctx.quadraticCurveTo(30, 10, 50, 30); ctx.stroke();
            },
            horizontal: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(10, 30); ctx.lineTo(50, 30); ctx.moveTo(45, 25); ctx.lineTo(50, 30); ctx.lineTo(45, 35); ctx.stroke();
            },
            tilt: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(30, 30, 15, 0, Math.PI * 1.5); ctx.moveTo(30, 15); ctx.lineTo(35, 10); ctx.stroke();
            },
            gantry: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(10, 45); ctx.lineTo(10, 15); ctx.lineTo(50, 15); ctx.lineTo(50, 45); ctx.moveTo(10, 20); ctx.lineTo(50, 20); ctx.stroke();
            },
            manual: (ctx) => {
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(30, 30, 10, 0, Math.PI * 2); ctx.moveTo(30, 40); ctx.lineTo(30, 50); ctx.moveTo(20, 50); ctx.lineTo(40, 50); ctx.stroke();
            },
            default: (ctx) => {
                ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(30, 30, 10, 0, Math.PI * 2); ctx.stroke();
            }
        };

        // --- APP LOGIC ---
        const app = {
            currentModule: null,
            currentStep: 0,
            selections: {},
            chartInstance: null, // Added to prevent memory leaks

            init() {
                DrawLib.lifterHub('icon-lifter-hub');
                DrawLib.genHub('icon-gen-hub');
            },

            resetToHub() {
                this.currentModule = null;
                this.currentStep = 0;
                this.selections = {};
                if (this.chartInstance) {
                    this.chartInstance.destroy();
                    this.chartInstance = null;
                }
                document.getElementById('hub-section').classList.remove('hidden');
                document.getElementById('workspace-section').classList.add('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            startModule(moduleKey) {
                this.currentModule = moduleKey;
                this.currentStep = 0;
                this.selections = (moduleKey === 'lifters') ? { weight: 35 } : {};
                document.getElementById('hub-section').classList.add('hidden');
                document.getElementById('workspace-section').classList.remove('hidden');
                this.renderStep();
            },

            renderStep() {
                const module = DATA[this.currentModule];
                const step = module.steps[this.currentStep];
                const container = document.getElementById('step-container');

                // Update Stepper & Logs
                this.updateStepper();
                this.updateAuditLog();

                let html = `
                    <div class="stagger-item visible space-y-6 md:space-y-10">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-100 pb-4 md:pb-8">
                            <div class="max-w-2xl space-y-2">
                                <p class="lg:hidden text-[10px] text-blue-500 font-bold uppercase tracking-widest">Step ${this.currentStep + 1} of ${module.steps.length}</p>
                                <h2 class="text-2xl md:text-4xl font-black text-slate-900 leading-tight tracking-tight uppercase">${step.title}</h2>
                                <p class="text-slate-500 text-xs md:text-sm font-medium">${step.desc}</p>
                            </div>
                            <div class="hidden md:flex bg-blue-600 text-white w-12 h-12 rounded-xl items-center justify-center shadow-xl shadow-blue-600/30 shrink-0">
                                <span class="font-black text-lg leading-none italic">${this.currentStep + 1}</span>
                            </div>
                        </div>
                `;

                if (step.type === 'slider') {
                    html += `
                        <div class="py-8 w-full max-w-3xl mx-auto space-y-8 md:space-y-12">
                            <div class="relative h-4 md:h-6 bg-slate-100 rounded-full shadow-inner border-4 border-white">
                                <div id="slider-progress" class="absolute h-full bg-blue-600 rounded-full shadow-lg transition-all duration-75" style="width: ${(this.selections.weight / step.max) * 100}%"></div>
                                <input type="range" min="${step.min}" max="${step.max}" value="${this.selections.weight}" 
                                    oninput="app.handleSlider(this.value)" class="custom-slider absolute w-full h-full opacity-0 cursor-pointer z-20 focus:outline-none focus:ring-4 focus:ring-blue-300 rounded-full">
                            </div>
                            <div class="grid md:grid-cols-2 gap-6 items-center bg-slate-900 p-8 rounded-[2rem] border border-white/10 relative shadow-2xl">
                                <div class="space-y-2 text-left">
                                    <span class="text-blue-400 text-[8px] font-black uppercase tracking-[0.3em] block mb-1">Manual Input</span>
                                    <div class="relative flex items-center">
                                        <input type="number" id="manual-weight" value="${this.selections.weight}" min="${step.min}" max="${step.max}" 
                                            onchange="app.handleSlider(this.value)"
                                            class="w-full bg-slate-800 border-2 border-slate-700 text-white text-3xl md:text-4xl font-black pl-4 pr-12 py-3 rounded-xl focus:border-blue-500 outline-none transition-all">
                                        <span class="absolute right-4 text-lg font-black text-blue-500">KG</span>
                                    </div>
                                </div>
                                <div class="hidden md:flex flex-col items-center text-center space-y-2 px-4">
                                    <div class="w-8 h-1 bg-blue-600 rounded-full"></div>
                                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest leading-relaxed">Determines tube diameter and safety factor.</p>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (step.type === 'grid' || step.type === 'binary') {
                    const cols = step.options.length > 4 ? 'grid-cols-2 md:grid-cols-3 xl:grid-cols-4' : 'grid-cols-1 md:grid-cols-2';
                    html += `<div class="grid gap-4 ${cols}">`;
                    step.options.forEach(opt => {
                        const isSelected = this.selections[step.id] === opt.id;
                        // Added focus accessibility styles to buttons
                        html += `
                            <button onclick="app.handleSelect('${step.id}', '${opt.id}')" 
                                class="flex flex-col items-center gap-3 p-5 rounded-[1.5rem] border-2 transition-all relative group overflow-hidden focus:outline-none focus:ring-4 focus:ring-blue-300/50 ${isSelected ? 'selected-card' : 'border-slate-100 hover:border-blue-300 hover:bg-white'}">
                                <div class="w-12 h-12 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 group-hover:text-blue-600 transition-colors">
                                    <canvas id="icon-${opt.id}" width="40" height="40"></canvas>
                                </div>
                                <div class="text-center w-full">
                                    <p class="font-black text-[10px] md:text-xs uppercase tracking-[0.2em] mb-1 truncate">${opt.label}</p>
                                    <span class="text-[8px] md:text-[9px] font-bold text-blue-500 uppercase tracking-widest opacity-60 block truncate">${opt.sub || ''}</span>
                                </div>
                                ${isSelected ? '<div class="absolute top-3 right-3 w-2 h-2 bg-blue-600 rounded-full animate-bounce"></div>' : ''}
                            </button>
                        `;
                    });
                    html += `</div>`;
                } else if (step.type === 'results') {
                    const rec = this.getRecommendation();
                    html = `
                        <div class="stagger-item visible space-y-8">
                            <div class="text-center space-y-4">
                                <div class="inline-flex items-center gap-2 bg-emerald-100 text-emerald-800 px-4 py-1.5 rounded-full font-black text-[9px] uppercase tracking-[0.3em] shadow-lg border border-emerald-200">
                                    <span class="w-1.5 h-1.5 bg-emerald-600 rounded-full animate-ping"></span> Complete
                                </div>
                                <h2 class="text-3xl md:text-5xl font-black text-slate-900 tracking-tighter uppercase leading-none">Solution <br> <span class="text-blue-600">Found.</span></h2>
                            </div>

                            <div class="grid xl:grid-cols-12 gap-6 md:gap-8">
                                <div class="xl:col-span-7 bg-slate-900 text-white p-8 md:p-12 rounded-[2.5rem] shadow-xl relative overflow-hidden flex flex-col justify-between group">
                                    <div class="relative z-10">
                                        <div class="flex items-center gap-3 mb-6">
                                            <div class="w-8 h-1 bg-blue-500 rounded-full"></div>
                                            <span class="text-blue-400 font-black text-[10px] uppercase tracking-[0.4em]">${rec.tagline}</span>
                                        </div>
                                        <h3 class="text-4xl md:text-6xl font-black mb-6 leading-none tracking-tighter italic uppercase text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400">${rec.name}</h3>
                                        <p class="text-slate-400 text-base md:text-lg leading-relaxed font-medium mb-8">"${rec.desc}"</p>
                                        
                                        <div class="bg-white/5 border border-white/10 p-5 rounded-2xl mb-8">
                                            <p class="text-slate-500 text-[9px] uppercase tracking-widest font-black mb-2">Schmalz Logic Engine</p>
                                            <p class="text-xs md:text-sm text-slate-300 font-medium border-l-2 border-blue-500 pl-3">${rec.logic}</p>
                                        </div>
                                    </div>
                                    <div class="relative z-10 flex flex-col sm:flex-row gap-4">
                                        <a href="${rec.productUrl}" target="_parent" class="flex-1 bg-blue-600 text-white font-black py-4 rounded-xl hover:bg-blue-700 transition-all uppercase tracking-[0.2em] text-[10px] shadow-lg shadow-blue-600/50 focus:outline-none focus:ring-4 focus:ring-blue-300 text-center">View Product →</a>
                                        <button onclick="app.resetToHub()" class="px-8 bg-transparent text-white border border-white/20 font-black py-4 rounded-xl hover:bg-white/10 transition-all text-[10px] uppercase tracking-widest focus:outline-none focus:ring-2 focus:ring-white">Restart</button>
                                    </div>
                                </div>
                                <div class="xl:col-span-5 space-y-6">
                                    <div class="bg-white border-2 border-slate-100 p-8 rounded-[2.5rem] shadow-xl">
                                        <h4 class="text-[9px] font-black text-slate-400 uppercase tracking-[0.3em] mb-6">Technical Spec Sheet</h4>
                                        <div class="space-y-3" id="tech-specs-list">
                                            ${rec.specs.map(s => `
                                                <div class="flex justify-between items-center py-3 border-b border-slate-50">
                                                    <span class="text-slate-500 font-bold text-[9px] uppercase tracking-widest">${s.key}</span>
                                                    <span class="text-slate-900 font-black text-xs text-right">${s.value}</span>
                                                </div>
                                            `).join('')}
                                        </div>
                                        <div class="mt-6 chart-container h-48">
                                            <canvas id="performance-chart"></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                html += `</div>`;
                container.innerHTML = html;

                // Handle button states
                const nextBtn = document.getElementById('btn-next');
                const backBtn = document.getElementById('btn-back');

                backBtn.style.opacity = this.currentStep === 0 ? '0' : '1';
                backBtn.style.pointerEvents = this.currentStep === 0 ? 'none' : 'auto';

                nextBtn.style.display = step.type === 'results' ? 'none' : 'flex';
                document.getElementById('btn-next-text').innerText = (this.currentStep === module.steps.length - 2) ? 'VIEW RESULTS' : 'CONTINUE';

                // Draw Icons
                if (step.options) {
                    setTimeout(() => {
                        step.options.forEach(opt => {
                            const canvasId = `icon-${opt.id}`;
                            const ctx = DrawLib.setup(canvasId);
                            if (!ctx) return;

                            const drawFn = DrawLib[opt.id] || DrawLib.default;
                            drawFn(ctx);
                        });
                    }, 50);
                }

                if (step.type === 'results') setTimeout(() => this.initChart(), 100);
            },

            handleSelect(stepId, optionId) {
                this.selections[stepId] = optionId;
                this.renderStep();
                this.nextStep();
            },

            handleSlider(val) {
                const step = DATA[this.currentModule].steps[this.currentStep];
                let max = step.max || 250;
                let min = step.min || 0;
                let numVal = parseInt(val) || 0;

                // Validation logic
                if (numVal > max) numVal = max;
                if (numVal < min) numVal = min;

                this.selections.weight = numVal;

                // Update visuals
                const progress = document.getElementById('slider-progress');
                if (progress) progress.style.width = (numVal / max) * 100 + '%';

                const rangeInput = document.querySelector('.custom-slider');
                if (rangeInput && rangeInput.value !== String(numVal)) rangeInput.value = numVal;

                const textInput = document.getElementById('manual-weight');
                if (textInput && textInput.value !== String(numVal)) textInput.value = numVal;

                this.updateAuditLog();
            },

            nextStep() {
                const module = DATA[this.currentModule];
                const currentStepData = module.steps[this.currentStep];

                if (currentStepData.type !== 'slider' && !this.selections[currentStepData.id]) return;

                if (this.currentStep < module.steps.length - 1) {
                    this.currentStep++;
                    this.renderStep();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            },

            prevStep() {
                if (this.currentStep > 0) {
                    this.currentStep--;
                    this.renderStep();
                }
            },

            updateStepper() {
                const module = DATA[this.currentModule];
                const stepper = document.getElementById('stepper-track');
                const percent = (this.currentStep / (module.steps.length - 1)) * 100;

                stepper.innerHTML = `
                    <div class="absolute top-[18px] left-0 h-[2px] bg-slate-100 w-full -z-10"></div>
                    <div class="absolute top-[18px] left-0 h-[2px] bg-blue-600 transition-all duration-500 -z-10" style="width: ${percent}%"></div>
                    ${module.steps.map((s, idx) => `
                    <div class="flex flex-col items-center min-w-[60px]">
                        <div class="w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm transition-all duration-500 z-10 
                            ${idx < this.currentStep ? 'bg-blue-600 text-white' :
                        idx === this.currentStep ? 'bg-slate-900 text-white ring-4 ring-blue-100 scale-110' :
                            'bg-white border-2 border-slate-200 text-slate-300'}">
                            ${idx < this.currentStep ? '✓' : idx + 1}
                        </div>
                        <span class="hidden md:block text-[9px] mt-3 font-bold uppercase tracking-widest ${idx <= this.currentStep ? 'text-slate-700' : 'text-slate-300'}">${s.label}</span>
                    </div>
                `).join('')}`;
            },

            updateAuditLog() {
                const module = DATA[this.currentModule];
                const log = document.getElementById('audit-log-content');
                const entries = module.steps.slice(0, this.currentStep).map(s => {
                    let val = this.selections[s.id] || '---';
                    if (s.id === 'weight') val = `${this.selections.weight} kg`;

                    if (s.options) {
                        const opt = s.options.find(o => o.id === val);
                        if (opt) val = opt.label;
                    }

                    return `
                        <div class="group flex justify-between items-center py-2 border-b border-slate-50 last:border-0">
                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${s.label}</span>
                            <span class="text-[10px] font-black text-blue-900 uppercase text-right">${val}</span>
                        </div>
                    `;
                }).join('');
                log.innerHTML = entries || '<p class="text-slate-400 text-[10px] text-center py-4">Waiting for data...</p>';
            },

            getRecommendation() {
                const s = this.selections;

                if (this.currentModule === 'lifters') {
                    const w = parseInt(s.weight);
                    const tilt = s.movement === 'tilt';

                    // SCHMALZ LOGIC:
                    // 1. VacuMaster needed if: Heavy (>140kg) OR Needs Tilting
                    if (w > 140 || tilt) {
                        return {
                            name: 'VacuMaster',
                            tagline: tilt ? 'Tilt & Turn' : 'Heavy Load Device',
                            desc: tilt ? 'A lifting solution that safely rotates workpieces by 90°/180°.' : 'A heavy-load lifting solution with dual-layer safety.',
                            logic: tilt ? 'Tilting/turning motion requires a VacuMaster system.' : `A ${w}kg load requires a chain hoist + VacuMaster system.`,
                            specs: [{ key: 'Series', value: 'Basic/Comfort' }, { key: 'Motion', value: tilt ? '90°/180°' : 'Horizontal' }, { key: 'Safety', value: 'EN 13155' }],
                            productUrl: '/products/schmalz/vacumaster'
                        };
                    }

                    // 2. JumboFlex: Light (<=50kg) AND Horizontal Only
                    if (w <= 50) {
                        return {
                            name: 'JumboFlex',
                            tagline: 'High Speed Handler',
                            desc: 'One-hand ergonomic tube lifter for high-frequency material transfer.',
                            logic: `Light payload (${w}kg) and horizontal movement are ideal for JumboFlex one-finger operation.`,
                            specs: [{ key: 'Control', value: 'Single-Finger' }, { key: 'Tube', value: 'Ø 100-120mm' }, { key: 'Feature', value: 'Quick Change' }],
                            productUrl: '/products/schmalz/vacuum-tube-lifter'
                        };
                    }

                    // 3. JumboErgo: Medium loads (50-140kg)
                    return {
                        name: 'JumboErgo',
                        tagline: 'Modular Tube Lifter',
                        desc: 'Tube lifter with twist-grip control for precise medium-payload handling.',
                        logic: `A ${w}kg payload is most stable with JumboErgo two-hand control.`,
                        specs: [{ key: 'Control', value: 'Twist Grip' }, { key: 'Payload', value: 'Max 140kg' }, { key: 'Apps', value: 'Universal' }],
                        productUrl: '/products/schmalz/vacuum-tube-lifter'
                    };
                }

                else {
                    const power = s.power;
                    const porous = s.porosity === 'porous';
                    const dirty = s.environment === 'dusty';
                    const robot = s.system;

                    if (power === 'electric' && robot === 'cobot') {
                        return {
                            name: 'ECBPi',
                            tagline: 'Cobot Pump',
                            desc: 'Smart electric vacuum generator with direct robot interface (NFC/IO-Link).',
                            logic: 'A hose-free design is ideal for cobot integration.',
                            specs: [{ key: 'Tech', value: 'Air-free' }, { key: 'Comms', value: 'IO-Link / NFC' }, { key: 'Gripper', value: 'Integrated' }],
                            productUrl: '/products/schmalz/vacuum-generator'
                        };
                    }

                    if (power === 'electric') {
                        return {
                            name: 'ECBPM',
                            tagline: 'Mini Electric',
                            desc: 'Compact electric vacuum source for lightweight automation without compressed air.',
                            logic: 'An ideal compressor-free setup for small-part pick-and-place.',
                            specs: [{ key: 'Voltage', value: '24V DC' }, { key: 'Flow', value: '1.6 l/min' }, { key: 'Size', value: 'Compact' }],
                            productUrl: '/products/schmalz/vacuum-generator'
                        };
                    }

                    if (dirty) {
                        return {
                            name: 'SCPS / SXPi',
                            tagline: 'IP65 Ejector',
                            desc: 'Compact ejector resistant to dust and splash exposure with Venturi nozzle technology.',
                            logic: 'Dusty areas require IP65-grade SCPS protection.',
                            specs: [{ key: 'Protection', value: 'IP65' }, { key: 'Nozzle', value: 'Single-stage' }, { key: 'Function', value: 'Auto-saving' }],
                            productUrl: '/products/schmalz/vacuum-generator'
                        };
                    }

                    if (porous) {
                        return {
                            name: 'Basic Ejector (SBPL)',
                            tagline: 'High Flow Ejector',
                            desc: 'Multi-stage ejector with high suction flow to compensate leakage on porous materials.',
                            logic: 'Porous materials require high flow rate, not high vacuum.',
                            specs: [{ key: 'Tech', value: 'Multi-stage Eco' }, { key: 'Flow', value: 'High Volume' }, { key: 'Response', value: 'Fast' }],
                            productUrl: '/products/schmalz/vacuum-generator'
                        };
                    }

                    return {
                        name: 'SCPM / SCPS',
                        tagline: 'Compact Ejector',
                        desc: 'All-in-one ejector system with integrated air-saving control.',
                        logic: 'An industry standard for airtight workpieces with high efficiency.',
                        specs: [{ key: 'Efficiency', value: 'Air Saving' }, { key: 'Control', value: 'NO / NC' }, { key: 'Monitor', value: 'Digital' }],
                        productUrl: '/products/schmalz/vacuum-generator'
                    };
                }
            },

            initChart() {
                // Prevent memory leaks / chart flickering by destroying the existing instance
                if (this.chartInstance) {
                    this.chartInstance.destroy();
                }

                const ctx = document.getElementById('performance-chart').getContext('2d');
                this.chartInstance = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: ['Efficiency', 'Safety', 'Speed', 'Ergonomics', 'ROI'],
                        datasets: [{
                            label: 'Solution Score',
                            data: [90, 95, 88, 92, 85],
                            backgroundColor: 'rgba(37, 99, 235, 0.2)',
                            borderColor: '#2563EB',
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#2563EB',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            r: {
                                angleLines: { color: '#e2e8f0' },
                                grid: { color: '#e2e8f0' },
                                pointLabels: { font: { size: 10, weight: 'bold', family: 'Plus Jakarta Sans' }, color: '#64748b' },
                                ticks: { display: false, max: 100 }
                            }
                        }
                    }
                });
            }
        };

        window.onload = () => app.init();
    </script>
</body>

</html>
