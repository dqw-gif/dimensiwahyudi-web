name: Reliability Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  reliability:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run reliability gate
        env:
          BASE_URL: http://localhost:3000
        run: npm run qa:reliability
